body:
  text: 蒙隠集巻二宋陳棣撰七言律詩送鄭舜舉赴闕書帯傳家飽六經飄飄詞氣海東青英名久合班朝列麗藻行觀掞帝庭修翮摶風上閶闔巨鱗縱壑擊滄溟投機亨㑹寜容髮願報除書慰側聆束裝西嘯指長安正是新春快活天酒病詩愁應有夢鳥啼花發正爭妍君空冀北今行矣我滯周南豈偶然東閤他時訪遺逸為言憔悴鶴谿邉籍甚聲名著日邉英辭健筆許誰先寘之華省星曹上付以赤墀香案前好向從班光玉筍竚膺宻炬照金蓮此行何啻登仙去願拜車塵為執鞭暫綰桐川刺史章優優布政漢循良鳳銜初下新頒詔鷄舌曽聞舊賜香前席久虗思見賈璽書増寵果徴黄從今定展調元手小試專城見雨暘備員無補見絲毫幸喜為官似馬曹每許蕪音持布皷更容劣技試鉛刀兼收屢賜百金諾借重終期一字褒廊廟他時應有待誓將么麽寄鈞陶春來春來底物最先知凍蝶癡蜂便欲飛好雨應時生地脉迅雷剖蟄震天威光風艷艷翔空閣和氣駸駸發細㣲解道蒼苔紅藥句令人却憶謝𤣥暉次韻王有之主簿春歸滿目盡桑麻岸栁敷隂荻有芽急景豈容留石火餘香何處認空花曲眉持酒真成夢纎手分茶亦浪誇欲醉流霞烹瑞雪直須同謁五侯家蓬生敢望直如麻才思真同焦榖芽擁被苦吟聲躑躅盈編細札眼空花羡君得意方豪縱顧我無知絶誕誇輸與能詩王主簿驚人句法自名家次韻葉秀實縣治環翠亭亭髙望逺破天慳萬疊晴嵐俯仰間着屐好追靈運逸垂簾尤愛愷之閒詩豪㑹見揮銀筆酒聖端能倒玉山杖履欲歸聊徙倚棲鵶寒帯暝烟還合綴嚴宸玉筍班尚勞小試簿書間溟鯤未擊三千里天驥終歸十二閑望氣行㸔求利劔知音當已識髙山逼人富貴君寜免未許山隂興盡還畏途蹤跡㡬間闗浩氣空存天地間沈湎恨無千日醉浪逰贏得半生閒觀書尚喜眼如月搜句誰憐肩聳山三徑曉來添逸興柳稍桃色報春還陪五馬勸農嵓山晩㑹桃花塢晩參旌騎勸農回賞遍郊原錦繡堆掠靣快風吹酒去逼人踈雨送詩來鳴鳩乳燕數聲好艷粉夭桃一笑開欲遣巴詞侑盃酌千鍾萬斝未容陪題温守梁尚書新創富覧亭傑檻雄簷倚碧空玲瓏窓户濕青紅因山卜地心機巧望水如天眼力窮千里勝形吟筆内萬家和氣飲杯中吏民共指雙旌語今日梁公昔謝公次韻陳公藻局中即事時推排物力不得徃來料峭輕寒春寂寥雨餘庭竹靜蕭蕭一池芳草翠欲合數㸃殘梅雪未消寸步思君成瘦悴片文怡我足歡謡相過政恐還驚座惡客從來不待招次韻㡬道玉泉小集時公藻以病僕以沿檄不與激水聊充一笑嬉扁舟西子想當時應憐波底無雙鯉直恐樽前有鸒斯笑我獨將愁醖釀聞君長苦酒禁持山中異日尋遺事徒見吾家伯仲詩諸公見和次韻呈鄭舜舉國録瑞伯仙尉冠佩追隨倐半生每憐蕭艾倚蘭英開懐共醉酒賢聖得句寜論詩父兄天賦君才行有用人言我拙坐無成登壇已拜風騷將誰敢區區踵孟明家聲赫奕繼更生草聖縱横亂伯英鄴下文章惟七子潁川人士有諸兄新詩寫物無餘態硬語盤空若混成吏隠一官聊戲劇他時勲業㸔承明用韻戲趙貫道買妾并呈鄭舜舉王有之二丈碧玉雙簮兩髻丫滿懐春恨正萌芽停橈空對無情水倚檻誰鄰解語花蚤與幽閨深領畧毋令狂客浪矜誇湏知三昧非凡手北苑知名第一家時貫道買妾置舟中舜舉有就茶求見之語次韻魯堯卿病起河陽桃李未成隂已覺栽培用意深病起暫同中酒味詩來還有惜花心養全浩氣虹千丈瘦减清標玉一尋春待吾儕共行樂莫言無暇倦登臨一區聊寄古墻隂燈火蕭條語夜深強對簡編聊適意欲參佛祖問安心青衫有約還輕别白髪無期苦見尋咫尺佳時修禊事蘭亭老筆為君臨代上時相生辰國論盈庭正尚同唯公英畧與天通一絲不斷千鈞重九鼎重安萬世功獨見敻超流俗外先機端在笑談中際髙極厚知難報願輔熙朝到不窮中興事業耀無前明聖相逢運半千盡納有生歸禮樂全提鴻化入陶甄八風自轉成天籟五緯更調祚有年體物形容勞頌筆浪云無象豈其然春光先向隴梅歸正值崧神降嶽時孕秀直疑天地相輸忠唯許冕旒知八珍錫燕宫厨送百兩傳宣使驛馳盛事逖聞千載後魯公綵服效兒嬉武定文明過十秋光芒無復見旄頭身更萬變心方壯位極千官寵更優賀厦阻趨丞相閤分符假守子陵州長生不老何湏祝元是丹臺第一流錢使君知原生辰天眷中興瑞玉麟果聞崧嶽為生申逢迎聖主千年運領畧東君五日春濟世豐功銘鼎鼐傳家清徳冠簮紳仙風道骨應難老曽向瑶宫侍帝宸十載幽居安緑野一麾出守擁朱轓華堂不聽紅兒唱凈几唯聞黄妳言庭下芝蘭方鼎盛胷中梨棗已長存梅花欲報和羮信故遣清香到夀樽上梁尚書生辰破曉霜晴快活天少㣲光彩煥台躔來從紫府飛仙窟生作皇家間世賢勲業定應銘鼎鼐儀容端合珥貂蟬外家舊事今重覩又致昇平五百年一麾卧治鎮江邉芳草還應夢恵連十載從班聫玉笋六城課最用蒲鞭依劉曽識尚書履借冦難私刺史天共徯公歸縁底事嗷嗷四海望陶甄上苑春光一夜回和羮消息報江梅促裝舊事追曹相折桂新榮付老萊千里頌聲形鼓吹萬家和氣入樽罍明年此日趨黄閣待㸔傳宣押賜來陳鎮江生辰協氣盤空兆吉祥挺生英傑輔明昌依乘聖際風雲久逰戲人間日月長落落詞華天黼黻堂堂儀榘國輝光煙橈破浪來何事敬為宗盟一瓣香力致功名上要途忠嘉屢奉玉音俞持荷久侍甘泉槖剖竹仍分刺史符撫字雅聞閒燕寢經綸先已定規模久虛左轄寜無謂天子疇庸正用儒着物薫然一氣和温温眉宇得春多腰黄眼赤渾閒事栁緑花紅奈樂何舊事㡬經銅狄話佳詞慣聽雪兒歌一杯何以為公夀願借長江萬里波立春日有感剪綵漫添懐抱惡簮花空映鬢毛秋流年舊事陳芻狗佳節新春報土牛里社浮沉貧可忍身名坎壈老宜休天髙難問平生意已矣冥心任去留王有之見和復用韻二首年來慵墮畏多愁怕見羣才得意秋題柱敢期乘駟馬隠鄽端欲舍蝸牛既成春服聊歌詠擬賦閒情且罷休漫道無心闗節物杖藜時為好山留小雨冥冥暗市樓無聊一日似三秋窮愁顧我堆千斛健筆期君回萬牛語恠未應書咄咄身閒底用賦休休曉來春到西窓外喚夢一聲黄栗留髙師魯以詩求鶴膝杖且有詩壇尋盟之語戲次其韻莫將好語趂時名寳唾聫篇得我驚酬唱蜂腰徒自苦棄捐鶴膝太無情故人何止十年别上座曽同千里行散策尋幽江上路何時歸踐白鷗盟榮枯寵辱盡強名老去無堪只自驚尤物端能亂人意麄官安得有詩情暫憑竹杖聊相謔敢對金樽畧放行果向詩壇尋舊約心如江水不湏盟客舍春晩晼晚春歸婺女城輕隂淺緑繞長亭禽聲勸客年年恨草色隨人處處青為米未容陶令去餔糟敢笑屈原醒詩成錯莫渾無事滿院楊花晝掩扄又次韻馮文度春晩二首花梢踈雨下巫陽酒靣新鵝拂嫩黄老去光隂春苦短閒中氣味日偏長方塘水滿丙鱗躍故壘泥空乙羽忙剩作篇章酬節物忍令相背去堂堂春到窮簷分外和典衣日日飲無何未陪蠟屐尋幽樂已覺詩囊得句多頗喜醉鄉無畔岸從教平地有風波脫巾露頂君休問倦客塵冠底用峩題義烏縣繡川驛湖漾晴波萬疊秋山攅逺翠兩眉愁一川暝色烟欹柳千里寒光月滿洲直恐斷堤横北固定知絶景冠東州塵纓欲濯滄浪水愧見沙頭雙白鷗再過繡川驛霜林病葉日凋殘更覺平蕪眼界寛天外碧雲山共逺堦前明月水爭寒愔愔夜氣侵肌骨戢戢詩愁入肺肝欲去自憐心未愜為君滿意更重㸔永嘉旅中小雨凄風釀早寒行厨蕭索酒壺乾抄書時自囁嚅語把菊誰同仔細㸔收拾夢魂歸枕上掃除愁思寄毫端家山只在一帆外望隔烟巒漫倚欄盛暑宿集福院晚風雨大作火雲燒天天為髙畏日爍地地欲焦舴艋浮江線溜澁招提稅鞅煩襟消風聲聒聒閙山闕雨脚霏霏轉樹腰猛省奔馳竟何事此心寜不愧漁樵甲子歳除一夕夢與先子論詩有云未能免俗猶聽䜟無計為生只送窮此吾頃年詩也汝亦得之否某曰己在家集中既覺泣書二章驚風急雪不勝寒葦索桃符歳事殘里巷杯盤喧半夜兒童燈火守更闌年催老色歸鬚鬢詩引窮愁入肺肝無復斑衣頌椒栢只將淚血洒毫端昔年浩氣許誰攀詩禮趨庭侍燕閒但喜新陽更舊律豈知斑鬢改朱顔時挑短燼傾蕉葉獨擁寒爐炷博山不見詩翁送窮處空留膏馥在人間再次韻畏途憂患飽相諳火芋何當問懶殘每覺愁來詩思苦更因老去壯心闌年光背我捐鷄肋世事甜人嗜馬肝撥盡寒爐殘漏永已知春馭到林端擾擾膠膠度嵗年只應今夕暫休閒又聞玉燭更新籥那得金丹駐舊顔是處碧烟聞爆竹誰家紅玉擁頽山揮毫不作驚人語句法由來似夢間庚申日戲題多情節物苦撩人用事葩華巧鬬新老去唯愁添甲子年來不獨畏庚申身閒淡淡心機靜夢好齁齁鼻息匀政使三彭肆簧舌氷壺貯月本無塵次韻李元老柬王令周簿喜雨阿香破旱用功深更遣新涼入素襟曝日已通賢令意望霓聊慰野人心水添淺瀬征帆穏雲掩殘陽古樹隂洗眼㸔君調燮手一同先已荷商霖山色雲容潑墨深隨車甘澍濕衣襟神龍應禱方施力虐魃為殃漫有心洗出篔簹無滯暑養成䆉稏有餘隂他年徳政君湏記能遣驕陽化作霖次韻馬仲元推官賀五馬喜雨甘澍隨車未足賢商霖小試漲晴川溶溶舊緑低蟬柳聒聒新流響露田刈熟腰䥥爭滿載叩門乞粟不論錢老農豈但歌襦袴盡道今年勝去年次韻喜雨兼簡彛老此身閲世一浮漚無地安巢拙勝鳩擊節聞君歌喜雨裹糧知我廹填溝涼宵自足莊生夢豐歳仍寛子美憂遥想髙人禪寂處娟娟窓竹不勝幽次韻喜雨雨氣侵人襟袖涼詩愁惱起沈東陽詰朝秧馬催田畯昨夜雷車動阿香鳩婦豈知憂旱去商羊聊亦為時忙芙蓉秋水湏佳句妙意宜搜到𣺌茫次韻陶㡬道喜雨環珮來從十二峯飛㢘清道駕豐隆已占月魄離星次欲採民謡詠雨濛健筆輸君三峽峻新涼許我一樽同豚蹄斗酒無多誚神報邦人亦已豐次韻陳季陵主簿秋雨一雨庭蕪便許涼掃除旱魃化驕陽㣲添逺水羅襟潤已覺踈苖玉粒香樂嵗可期寛吏責謭才無取為詩忙蕭蕭枕簟偏宜睡夢入華胥正𣺌茫客舍久雨無酒戱柬沈泰叔秋來濘淖㡬曽乾旅邸盤旋尋丈間擬仗神功擊陽石却疑天漏類隂山已甘從事經年别未放管城終日閒欲課新詩強消遣客情無頼語還慳次韻莫訝經旬笑語乾誰令挿手斗筲間長篇險語懐東野俗狀塵容愧北山車馬無堪泥淖滑蛟龍不放水雲閒翻思九夏無涓滴天意何如向日慳次韻陳季陵覔酒二首西風曽未入梧楸已有騷人怨凜秋草賦未為傖父語破愁宜召麴生謀君方負笈金陵去我欲乘桴滄海浮後夜月明應好在一樽能為輟行不山逺誰憐眉黛愁水明遥憶眼波秋久抛大白猶閒事卻對短檠真拙謀楚佩紉香塵未暗巫雲賦夢語多浮扊扅政恐閨人怨曽效當年擁髻不次韻劉伯瑞覔酒貧病相仍坐拙方敢將斗酒博西涼自憐里巷棲遲久倍覺樽罍氣味長玉斚交飛君有約紅裙共醉我何嘗一樽聊慰相如渴要聽歌聲過女墻謝汪汝平送酒塵土侵陵老瓦盆胷中磊塊與誰論閒披黄巻欲欹枕忽有白衣來扣門和氣醺人紅緑眩濃香破鼻典刑存倒罍徹底清如水不比春江帯雨渾汝平諸公見和復用韻二首鵝黄快瀉映金盆白墮湘酃豈並論酩酊不妨尋醉侣鞠躬底事入公門盃觴往往陪嘲謔筆札時時荷記存指日㸔君乘障去好將韜畧靖羌渾新詩敏㨗雨翻盆樽酒何時與細論擬把鉛刀侔巨闕卻慙布鼓過雷門天心月脇形容遍春蚓秋蛇體勢存但得唱酬為老伴此生道眼未容渾再用前韻三首刺頭底事向膠盆沉湎應從通率論人世百年都是夢醉鄉四逹總無門顛狂自索形骸外酣適寜知禮法存日飲亡何真得計袁絲由此脫全渾墮地何勞顧甑盆事同電往不堪論歸休我願白駒谷登用君宜金馬門氣習肯隨流俗變笑談如見古人存詞源清徹如甘井愈汲方知愈不渾陶冶無心甕與盆等閒妍窳意難論年光未易留駒隙世事唯堪隠鹿門久客思家華髪滿小儒憂國赤心存江山還有新亭嘆痛惜伊川化陸渾别墅芍藥盛開沈公闢有詩見嘲次韻代柬誰為東君得意忙尚留紅藥殿羣芳臉霞得酒生朝暈衣翠籠紗弄晩粧賸馥倚風來蝶翅殘膏和露到蜂房惜花極力搜佳句瘦損東陽笑沈郎翰林憶昔詠孤芳自合移根向玉堂貴客親陪天女手侍臣應帯御爐香花前未許退之醉江上空嗟子美狂一夜殷紅飄落盡不堪寂寞對霞觴次韻艾慎機縣庠蕉花蕉心擢秀占文庭潤沃偏宜雨露聲已向杏壇新表瑞莫嫌花譜舊無名决科此日先幽䜟記異他年見史評况有能詩賢令尹直將美事付羣英艾以諸公雌黄其詩意殊不平戱用前韻載味君詩字字新方知後實稱先聲文章素號五經笥姓字行添千佛名趙璧有瑕虛指示隋珠無價妄譏評官閒聊戱管城頴小草銀鈎亂伯英次韻蘇守金橘孤根移植自秋山長養潛私刺史天青女染成金色淺馮夷剖出蚌胎圓慙非甘吉曽同傳恥與楊盧議並肩况有詞章傳樂府佳名從此入新編白菊千芳百卉正凋零喜見東籬粲玉英粉靣真能延月姊檀心端不羡梅兄騷經豈為黄花作丹鼎應湏素液成勿訝開遲後佳節白衣猶足向淵明抱朴子云生丹法用白菊花汁次韻梅花得得尋梅已覺遲凭欄空賦惜花詩流傳逺信人千里漏洩春工雪一枝照水丰容妃子浴傍山瘦影伯夷飢最憐清絶牽情處月落參横畫角悲凍合千林暖未回一枝先見臘前梅寒溪淡月憑誰賞冷蘂踈香不自媒頼有此君為伴侣畧無凡卉作輿臺欹危百折江頭路應為多情得得來鏤玉凝酥若未匀南枝髣髴露天真横陳月下無雙影占斷人間第一春屈子浪吟蘭畹佩韓公羞卜杏花隣廣平見謂心如鐵翻學髙唐草賦人愛花長苦惱天君政恐因花賦洛神江上風霜方破臘嶺頭氷雪已回春故人逺信來千里浪蘂凡香隔一塵天與孤髙超世俗肯將賸馥乞蜂臣次韻劉敷言新鴈倦飛聊復下江湖此去衡陽萬里餘陣合魚麗司馬法字排草聖右軍書隨陽度塞身良苦避繳啣蘆計已踈一抺參差無亂序似聞衙皷列羣胥觀曹夀卿上舍詩軸題其後君詩字字敵雙南直把驪珠取次探李杜盟寒誰共主曹劉機淺不須參囊中句好縁多愛天外心歸計飽諳讀罷長編如雋永自然齒頰帯餘甘欲觀騷雅繼周南虎子應須虎穴探策蹇衝寒將類賈避堂舍蓋願同參書能泣鬼世誰信詩解窮人我自諳但得低頭拜東野此心依約已先甘旅中有感復用前韻擿埴憑誰為指南囊空羞澁不容探年光有限堂堂去世事無心細細參故舊白頭驚未識比隣青眼喜相諳此生自斷何須問荼苦從今等薺甘戲徳秀㡬道小檻新篁脫籜初依然數軸壁間書已無塵落清聲外空有香分素手餘古獄寃銷神劔去髙堂夢破曉雲踈圜扉只掩青青草門外應無長者車使君饋食戲少䝉教授朝來食指非常動果報兵厨已割烹醇徳且多從事酒珍庖特異小人羮虎頭食肉方灰念羊脚蹴蔬應震驚歸遺細君真得計隨縁燈火任卿卿還余朝綱雜編胷中渾渾乏新竒虛辱熊羆百萬師較藝昔嘗窮五技還書今復墮三癡退飛頗愧一為甚盡銳那知再愈衰自計抛書無復用緘題重寄仲舒幃偶書詩魔大抵解窮人到得人窮句益新筆下自慚無好語眼前底事最清貧草𤣥天禄書窓冷滌器臨邛酒市春自古才髙多命薄區區何必論錢神戲效連珠疊韻體泝流遲澁順流輕石岸﨑嶇沙岸平髙樹影藏低樹影前灘聲掩後灘聲飛禽飛去語禽語歸客歸休行客行望斷誰憐魂欲斷詩成轉覺夢難成戱題酒肆一氣無私萬物春小兒造化果能神鳥啼花發遽如許酒病詩狂那厭頻倒著敢期山簡醉典衣誰計少陵貧上林五柞他年賦姑作臨邛滌器人夜雪書帷夜雪耿無眠晨起猶禁曉日寒旋見軟紅生野水似㸔寸碧出遥山詩成已覺風生座飲散俄驚月滿鞍夢破小窓依約態渾疑暮雨楚臺還挽處士喬公姓氏詳聞月旦推典刑尚可一斑窺義髙諾重人皆仰劵失金存自不欺富貴浮雲曽唾去死生幻泡獨先知一經教子隂功逺印綬纍纍㸔異時挽提幹趙君識君童稚過成人旋見從師學日新一舉文塲收雋譽十年仕路固清貧豪添徐邈中賢興瘦减相如病渴身好善如顔還短折傷哉命也重悲辛挽張世英母夫人異鄉萍梗寄生涯朝露俄驚嘆落花蒿里歌傳風正惨萱堂香冷月空斜魂歸故國三千里地卜髙原一萬家明日送車應擊轂不堪閣泪聽邉笳七言絶句巖桂餉鄭舜舉戲筆代柬天香薰透辟寒金拂拂鵝黄漢額深多謝西風喚幽夢徑隨秋蝶到踈林折得天葩滿袖香小窓寂寂伴淒涼何如乞與文園客瑶髻斜簮試晚粧再次韻翠葆低籠衣縷金惱人風味在秋深不縁月窟移仙種安得塵寰有桂林天恐花神漏洩香故教醖釀待新涼丹鉛不御丰容淺一洗塵凡時世粧次韻徐庭珍春日雜言十首溪風嫋嫋素濤翻兀坐書帷怯悄寒老去見春如夢寐此心底用倩人安身如不繫一虛舟入眼江山總舊逰視昔視今俱勿論且憑從事到青州燕雀經營競短簷未容蝶夢到花前吾生㡬閲春榮謝自嘆如蠶已再眠擾擾膠膠且罷休㑹栽奴橘滿汀洲但教方寸無餘事不必林泉學枕流輕隂醖釀勒花天節物撩人接禁烟沂上未成曾㸃服杖頭聊掛阮生錢沉酣蠧簡不知春庭設雀羅誰扣門拄頰㸔山無限意隂晴變態異朝昏卉木爭供衆妙薫春工試手為裁成紛紛落蘂鶯邉雨寂寂逰絲燕外晴幽花野蔓竟誰栽傍水盈盈一笑開㡬許逺携吟筆去未應空掉酒船回冶葉倡條過女墻依然還作故園香雄蜂雌蝶無聊頼盡日顛狂有底忙小兒造化本無心孰為芳時作主人唯有丹青留得住好令昌軰冩花真次韻陳季陵元夕山城燈火欲黄昏濕雨踈梅暗小園回首武林行樂地太平風物似開元歸休無頼曲眠肱掃盡繁華只一燈冷淡生涯吾舊物前身疑是小乘僧顧我每為驚座客如君真是謫仙人相逢不作尋常語一笑同酬惨澹春李倅生辰伯陽飛御上層天繼世雲礽盡謫仙炯炯方瞳真夀相不勞頌祝自長年心覽沖虛厭物波樽前肯聽雪兒歌能捐伐性嬋娟斧不必樛枝號養和文章浩浩若江河錦槖嘲吟得句多政恐絲綸湏大手竚㸔三俊在鑾坡挽奉議劉公度英譽當年藹上庠談經肯羡解頤匡才髙不第空嗟惜一命聊為末路光平生學術在斯民藴積淵源百未伸邉障掾曹聊小試一城恵愛已如春風鑒髙明世少雙衮榮撻辱擅雌黄湏知柱下書言手元是東床坦腹郎掛冠神武賦歸歟旋捧恩綸賜佩魚誰謂桑榆將暮景駢來慶事萃門閭過馮公嶺整促籃輿破曉晴嵐光滴翠夾衣輕日窺青嶂㘭中出身在白雲深處行陳公藻覔筍仍許作包子玉版禪師來應供錦綳稚子敢分珍并包更籍桄榔屑風味懸知定可人晩春道中四首簿書叢裡掣歸身萬樹毶毶淺緑匀試向小園尋落蘂慇懃拂拭覔餘春歸塗檢㸃物華非黛色隨風上栁枝撲撲晴香戀芳草却疑春去未多時纎穠掃盡換清隂便有南風欲薦琴漫道仙葩歸閬苑小兒造化本無心芍藥無香燕有雛綿蠻猶苦勸提壺直湏強作留春計爛醉黄公舊酒罏回文二絶春晩落花飛藉草月明驚鵲墮棲枝人歸望濶江天暮夢斷愁深夜漏遲衣沾暗淚香凝怨錦織新詩逺寄愁圍减帯銷紅玉瘦粉慵粧淺翠蛾羞
