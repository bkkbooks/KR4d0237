body:
  text: 蒙隱集卷一宋陳棣撰五言古詩題范烏程松桂亭誰云宰邑難宰邑有真樂但知絃歌趣永謝塵勞縳琴堂吏驚散晝日垂朱箔燒香對棐几文史資優學一洗朱墨昏至味非糟粕范公今循良一同聊笑謔回視卓魯輩政可束髙閣苕溪古侯邦繁庶類京洛壯哉萬户邑何異逢盤錯公來省其俗治劇操至約政成日有餘空庭可羅雀西園久棄置疏町走芒屩經營四顧間得地平如削築堂號松桂軒檻敞寥廓雖無松桂隂胸中自丘壑况逢賢使君成有新詩落異時採歌謡持用獻木鐸題竹友軒長夏苦炎熱開軒除鬱蒸簷前烏雀喧朝旭上朱甍席間裁函丈詩書浩縱橫盤礴環堵間幽獨懷友生古人在黃卷千載使我傾出門窺物變草木各鮮榮青青墻東竹見汝忽眼明愛玩不能忘移根傍軒楹俯仰與竹俱定交見深情不是無朋友此君氷玉清風吹萬籟響寒梢韻竽笙我獨哦其間詩作秋蟲鳴琅玕亦有實期汝向秋成鳯凰何時來翽翽翔我庭棲軒偶成呈同僚我本山中人勉強束冠帶缺伸輒有拘似被天工械誰令作此來政為窮所賣規彼五斗粟折腰何足怪敢希拄頰傲寧免望塵拜平生浩然氣摧落甘伍噲兹軒粗可人虛名供眼界得從黃妳逰佳處時一解多生作蠧魚復此償書債雖抗塵土容耿耿氷壺在同僚多俊逰臺閣鵷鴻輩胸中有雲夢略不見芥蒂吏師有龔黃民賊絶蜂蠆而我躡後塵嘉穀雜稊稗詩壇欲尋盟恐墮拋磚戒翻思石鼎句自取侯郎敗終期探理窟一洗荆榛隘得肉姑置之大嚼聊發快次韻葛教授新闢柏桐軒柏桐有正性梁琴豈其天丹雘自輝耀絃徽漫鏘然深慙社旁櫟政爾終天年復愧南城槁猶知過飛仙廟前今安在㸑下亦浪傳何當生學宫廣文遺新篇色映醉吟杜隂休眠晝邊端如兩髙弟儼立聽誦絃又如雙青衣對舞風露前方依植壇杏不羡干雲楩日哦二木間妙意遺言詮霜枝半摧剝月影相回旋後雕嵗寒見始華春意全比德君無愧五栁徒自賢再次韻柏桐軒修垣蔽軒楹如觀坐井天髙人為披豁物趣俱森然柏桐伍蒿萊混迹幾嵗年俄驚俯丹楹况得依臞仙佳名一品題好語萬口傳髙參溜雨句美並朝陽篇掄才稽往牒橫陳榱棟邉論功及乃祖屢薦薰風絃謙居髯松下優在良梓前荆徐入貢時曾不數樟楩固殊上林木虞衡日量詮且異溫室樹衣冠時繞旋此方安靜僻所欲唯生全植物貴遂性憑君較愚賢次韻蘇伯言題所居鑑止軒小軒劣容膝詎敢邀君詩君詩亟借重物趣俱新竒簷前列蒼翠檻外瀦漣漪憑欄作癡兀欲靜忘五綦湛然俯明鏡水定心不馳微風忽披拂巾袂俄變移緬思東坡公昔與潁水嬉此樂五十年人間真未知次韻鄭舜舉題簿㕔交翠軒人生一漚浮何適非暫寄㑹須脫塵勞談文不談利開軒得此君意愜投宿嗜未堪食鳯凰已足巢翡翠惜哉小窗櫳此地久何閟想當未闢初寧免簿書纍髙人一披拂便有無窮意紛紛市㕓子冠蓋亂如沸倘令見清標魄褫復喪氣容如王子猷不速端可致嗟豫飽憂患久矣無佳思舊學已榛蕪聞一豈知二市肆羅無目聊為將軍地斗酒詩百篇是乃公能事次韻陳季陵記夢夜閒得安寢方期萬事休那知清夢中蟻穴有勝逰朝把南柯麾暮獵龜山頭停杯猶未舉俯仰二十秋等為幻緣縳名實或相浮邯鄲囊中枕徑渡竹葉舟俄頃失所厯變滅隨東流逰仙豈神交因想理或不至人本無夢偶夢非謬悠乃知一念熟寤寐歘何求子建賦感甄空貽方䇿羞何當破諸妄自足銷沉憂政使對癡人言之亦寡尤先春賦梅一首與客到先春衰思覺飛越時當萬卉凋似補羣花闕始信元化功生意何曽輟却疑鈞天宴羣仙委珮玦不數藐姑山神膚瑩氷雪癯然抱清幽卓爾負竒絶生香巧藏密靜艷羞容悅陽萌知獨復嵗寒見孤潔我來觴其下坐對垂垂發頭白不待摧顔赬為爾設因思年少時髙枝手攀折林逋與何遜妙語誰優劣老矣吟事慳人笑心如鐵何當夜深來更看梢頭月惜梅朔雪沒寒蕪嚴威等羣木東君惜江梅先與借微燠造物逞新竒亭亭付幽獨天然氷雪姿不許鉛華瀆踈影浸澄波斜枝度修竹竒標含春容清致漫山腹夜月耿扶踈寒風來馥郁素艷等瓊瑶真香笑蘭菊昨宵風雨顛遺英滿平陸憑誰望蒼天榮枯何太速凌晨眠霜林餘芳猶五六不厭終日看尚可供詩目次韻葉夢符端午吾邦重午節興目皆可寓逰人肆喧闐畫舫紛排布遡風伐鼉鼓擊楫觀競渡驕豪務相誇水陸爭治具醉憂瓶之罄歡迫日云暮朋從喜盍簮謔浪時一遇朅來廷尉府官冷知誰顧吻燥無復濡腹枵何時飫堂堂匡鼎來解后肯同趣携家忽過我市飲容旋酤遙知分己投更喜首暫聚慙非浴沂人鄙志䝉推與憐我孤危資極力為調護髙談驚四筵坐使兒女怖便當追彥國未肯多文度長篇粲珠玉綺語斥霞鶩人生類飄蓬㑹合寧有數交情看白頭何必論新故沈德和使君生辰星斗煥靈輝川嶽儲英氣散為天地祥鍾作人間瑞正應五百年乃克見名世長庚夢太白斯文得鼓吹嵩髙生甫申中興資屏衛若人不時出或出豈無謂岩廊賴嘉謨民物䝉美利權輿生吾道羽翼副六藝我公豈其倫禀賦已殊異由來活國手固自有次第麟閣仙蓬萊蘭省星躔次瞻之已足榮到者亦未易惟公名德尊飛聲從早嵗青錢中妙選豈止一科第果聞超卓姿遍歷清華地青藜照讐書赤管供奏議視典昔常逰觀耕嘗入侍熙朝百度新一麾煩卧治欲知天眷隆御屏題姓氏公豈久外人趣裝宜早計桐川古桃州地僻官事少簡靜宜有餘苛刻則煩擾公來省其俗好尚已默了碧凝燕寢香青鞠圜扉草麥壠雨初勻棠隂風自掃回觀漢循良未足語治道豈惟術數多更覺規模小公將宰天下一郡乃戲嬲便當作吏師詎止為民表邦人何所祈區區頌難老化工有至仁噓為三月春寧知清淑氣回薄在兹辰兹辰亦何有璇霄見老人黃堂沸笙簫宴席方橫陳寶觴酌流霞艷歌飛梁塵未嘗王母桃敢薦䝉莊椿賤子今何幸明時識鳳麟馬曹寧寄傲鼠技屢迷津尚容東郭吹敢效西子顰誓將頑鈍質埏埴煩陶鈞七言古詩釣瀨漁樵行送嚴守蘇伯業赴闕漁樵生長子陵州偶為城市逍遙逰相逢欲話平生事以手加額頻㸃頭自言家世居村落頗厭吾邦風土惡大飢小歉偶一遭棄擲鋤耰弄刀槊二十年前事可驚錦襦繡帽爭乘城太平日久人忘戰衣冠荆棘戈鋋腥去年米貴無餘粟往往驚顧如麋鹿大開陳廪貸兼并却笑鄰邦才食粥只今豐盈天報施餘糧棲畝麥兩岐牛羊日落草萊處場圃秋深䆉稏時父老歌謡童稚笑歡聲萬口如同調向來逰手今良農今日膏腴昔荒嶠漁樵無事官無逋民不識吏亡追呼田間苐見隨軒鹿道上兼無攫肉烏問云何術能臻此盡道我公才德美文采風流求古人循良事業空前史公今去我歸朝天攀轅截鐙何當前願公早佩紫荷橐顧我擬續甘棠篇欲碑遺愛傳千古政聲未暇從頭數大書特書不一書請載漁樵當日語次韻陶幾道觀洪積仁詩編令尹韜潛藏六龜逸韻長憂兒輩知剡藤敲氷琢玉板月脫頴供毛錐冥搜豈但夢春草招隱昔嘗吟桂枝江山駿奔來筆下疑有神助非人為公餘退客醉經史底用紅裙捧玉巵凌雲未讀相如賦解頤共聽匡衡詩詎容陶令賦歸去且效謫仙歌别離手題六紙勿輕示把玩自足娛安期千篇政恐雷電取數仭不許門人窺何當築壇拜詩將一看橫槊英雄姿題李杜畫像吟詩莫學李太白千首萬言皆酒色吟詩莫學杜拾遺一生抱恨長嗟咨二豪胸中有佳趣詩酒聊以發其悟世人有眼誰識真苐見詩篇不見人借令置之廟堂上事業肯道風騷將睥睨連帥奴將軍英風義氣髙薄雲我今再拜觀遺像猶疑飯顆相逢樣詩題繪事在人間光熖何翅長萬丈鄭倅生辰柯山插空天為鄰飛仙窟宅無纎塵降靈孕秀神所相豈但嵩髙生甫申笑别方壺離紫府道骨清標映華組二十八宿羅心胸霽月光風映眉宇書帶家聲舊著聞相國邸第南北分人間未省見三絶天上曽觀瑞五雲箋詩傳禮窮家學豈止談經能折角鼓篋來為碧水逰賢關英俊推先覺雄文大手古無倫安知韓柳非前身方期江夏無雙譽只許樊川第五人厭直承明祈外補暫擁屏星左銅虎萬口爭歌王海沂懸榻已題陳仲舉籍甚聲聞咫尺顔竚聽鋒車趣賜環歸持清禁紫荷槖却踏彤墀玉笋班我今幸遇懸弧旦敢採民謡書弱翰一言何以祝我公願輔升平到不窮古逰俠行君不見長安俠少兒臂鷹走狗爭輕肥一朝遭渠國士知笑視鼎鑊如氷澌翹關負重俱細事拔山扛鼎焉能為橫行胸奴十萬騎肯以祕計干閼氏朝竊晋鄙符暮解邯鄲圍軍中不聞天子詔向來灞上皆兒嬉我有黃石書孺子漫多竒我有歐冶劍荆卿何足揮運籌折衝袵席上料敵决勝如蓍龜世遭右文歎數竒縱有勇略將安施漢皇方受宣室釐干戈不用包虎皮使我不得封萬户恨不生當髙祖時傷春詞春風兮颸颸春日兮遲遲草木秀兮原野蘭茝芳兮水湄美人去兮何所白雲深兮莫窺望極浦兮掩淚倚危檻兮懷思囁嚅兮鳦語連娟兮蝶飛感微物兮靈偶私自憐兮芳時玲瓏兮瓊珮沉寂兮蕙幃對芳時兮太息豈獨凛秋兮足悲香消悴兮鸞鏡愁委積兮堆蛾眉登山臨水兮有蘭夢斷鴈沉魚兮無錦詩鶗鴂鳴兮衆芳衰春冉冉兮不可羈人生行樂兮將何之王孫王孫兮胡不歸食枸杞菊并序僕官桐川廨舍迫子城城多叢杞野菊每嵗自春徂夏擷以為葅甘芳之味意珍羞無與比也偶讀陸蘇前後杞菊賦成古詩君不見天隨有宅松江曲屋隙墻隂多杞菊課兒採掇入杯盤匕箸芳香勝粱肉又不見坡公昔佩刺史符賔客少至無與娛偶餐杞菊作後賦捫腹噎嘔猶軒渠散人枯腸真食杞居士戲筆聊爾耳膠西自古號侯邦齊厨縱乏寧需此我今作掾長苦飢一區不異耕田時太倉紅腐才五斗舉家食粥寧忍炊頽城草木迷荒榭緑頴芳苕羅舍下官閒擷取芼春羮未棘未莎皆不赦三年享此似無饜二者誰云不可兼行趣歸裝耕谷口此物猶堪饁南畝次韻章堯文梅花先生讀書常閉户卒嵗優遊娛藝圃風雷筆舌待時攄錦繡肝腸終日吐鳴騶未驗北山文絳帳且為東道主忽作尋梅得得來南枝未落北枝開攀條弄英不能去只愁白日空西頽臨池照影都無伴偶挂幽昏不用媒主人生來幾傳癖道耕德獵無遺力形模竒古每起豫議論縱橫時奪席但喜書橫孔聖編那知梅怨桓伊笛正值清霜爛漫晴賔從滿目皆豪英未開東閣緣何事要見詩鳴訴不平明日定拚花下醉想公不負白鷗盟驟雨呈質夫兄屏翳驅馳雲陳疾西山猶銜半輪日迅雷震地窗户搖急雨翻盆溝澮溢紫電燒空天為低黑風逆浪海欲立縱多虐魃未為殃直使長鯨那暇吸草木號呼山鬼驚珠璣亂迸鮫人泣曲畦走水白紛紛稚穗抽芒青戢戢童稚休傳蜥蜴歌倉箱行貯生民粒枝端發翠喜濯枝池面凝漚占戴笠猛省呼晴鳩婦鳴旋看突漲魚兒出窗扉共賞一襟涼屋漏俄驚半床濕鷗鷺盟邉引望遙芭蕉聲裏催詩急請君速著瑞雨頌要上新編華萼集送李明甫召除奉常簿睿主臨軒逹四聰皎如麗日明髙穹傾葵發蔀燭幽隱熙然萬物還春風鼎新百度躋時雍西垣東省羅鵷鴻鋒車趣召無虗日髙陽才子咸登庸古桃小壘江之東邇來慶事何其豐使君已秉螭坳筆尺一于今召我公我公智略真䕫龍劔佩合侍明光宫升平雅樂欲大備暫借筆管調笙鐘奉常地峻位望隆不與列棘監寺同文傳章句羣經外器識錞于衆樂中不願封侯食萬鍾不羡乘雲逰樊桐羡公此行登仙去蜚聲直上徹九重上方更化歸醇醲論思獻納宜舂容凝旒若訪草茅士餘論無忘采菲葑鬻婦歎凶年老弱難相保歸與婦謀謀不早啼飢滿耳不忍聞待得麥秋人已槁有辭欲說重酸辛欲說未說眉再顰就令相視飢餓死何當持汝歸富人朝歸富人夕得粟數口尚堪同食粥愁容斂袂哽不言稚子牽衣驚且哭答云至此奈若何離别孰與性命多他年豐稔五穀熟勿吝百金來相贖題鑑止軒安身南北皆吾里勿較使行兼尼止心猶泥絮吹不起豈有顔甲生微泚方塘淨緑含真理與我娛嬉聊爾爾佳處難言還隱几冷暖自知如飲水端午洪積仁召客口占戲柬薛仲藏佳節撩人愁欲卧衝門都騎傳呼過想簮榴艾泛菖蒲應召鄒枚雜郊賀歌聲端不羡紅兒酒力真堪欺白墮自愧雖非趙倚樓何當一效陳驚座五言律詩春日雜興五首春色遽如許春愁一望賒簾低宜著燕柳暗欲藏鴉鳩婦催踈雨蜂臣趂落花只愁清景促無計駐曦車地僻近煙蘿門無車馬過林深宜雨急野曠覺春多草軟逰人醉鶯嬌姹女歌顛狂江上興可奈少陵何桃李漫芬芳終然委路旁踏青心欲醉舉白興何長夢覺池塘緑詩成草木香懶追時俗好獨立倚蒼茫鴨緑前溪漲鵝黃逺栁垂微波卷羅帶細葉展顰眉愛酒常歌頌傷春更賦詩東君無限思全在野桃枝料峭寒猶薄隂雲帶晚烟雨催驚蟄候風作勒花天日永消香篆愁濃逼酒船為君借餘景收拾賦新篇春日偶成三首東君馳驛騎萬里一宵通栁眼凝晴碧桃腮泣露紅丙鱗安淺瀨乙羽怯柔風莫向髙城望愁生阿堵中雨後春逾麗平堤漲緑波侵人花氣釀刺眼麥芒多舴艋閒蓑笠鞦韆醉綺羅光隂難把玩秀句與消磨陋巷逢春日生涯亦足誇堆錢聚榆莢積絮撲楊花旌斾千行竹笙歌兩部蛙憑誰為商榷何似五侯家再次韻小圃香初足枯池水乍通捲簾延舊燕掃徑襯飛紅寂寂梨花雨斜斜栁帶風東君有餘思别在一壺中雨過灘聲急無風亦自波花稠春意閙山逺月明多地僻無來轍門閒欲設羅胸中元礧磈詩酒漫揩磨老去歡情少逢人強自誇閒愁付蕉葉衰鬢耻菱花倚杖閒捫虱臨池戲詠蛙深慙詩律細何以世吾家叠韻春日雜興五首南陌逰人少東城去路賒尋芳閒趂蝶失喜漫占鴉著物春猶淺薰人氣自華夜來風雨急驚動阿香車幽懷聊自適踈性懶相過塵事偏宜少詩篇不厭多三人花下酒一曲醉時歌此外非吾事陶陶奈樂何遣興文楸內微吟錦瑟旁泉聲谷口靜月色竹隂長酒入肌膚暈茶餘齒頰香望窮却回首此意造微茫經春衣帶賸過午食簞垂嫩緑方迷眼輕黃未上眉世情無足語節物總堪詩未展摶風翼鷦鷯且一枝踈鐘餘逸響野燒矗孤煙輕暖花邉日微寒雨後天才能拆襪線詩思上灘船却憶峨嵋老杯停已百篇春雨春雨止復作無聊終日閒殷紅悲著地淺緑暗歸山雲幕久䝉潤風扉每日關愁端與詩思容易減朱顔寒食懷公藻幾道灑落陶彭澤風流陳太丘别來添夕夢歸日負春逰已改枯榆火寧汙寒具油不知行樂地能話野人不倦暑試作西風想煩襟鬱嫩涼李沉寒玉碧瓜泛淺金黃羽扇徒揮雪紗厨不貯香白醪雖可漉染指敢先嘗感懷二首道義年來勝幽居興倍長望隨愁共逺懶與事相妨斜月光生座修梧影轉廊是心無起滅世態自炎涼已嘆東隅失桑榆浩莫收只知心緒懶那覺鬢毛秋有酒堪藏拙無門可避愁吾今知此意萬事付悠悠遣興早願風雲㑹那知嵗月侵未應忘故步已覺負初心蕙帳聊跧伏天閽隔邃深且憑詩遣興往事任瓶沉靜夜靜夜披黃卷青藜照五行恨無知我鮑空羡起豫商學業心將棘功名鬢欲霜此生應自斷無復問穹蒼晨起趨府五鼓未停撾喧呼趨早衙霜風晨正急望月曉初斜輿竹依青蓋燈籠閃綘紗三年蝴蝶夢笑殺野人家清晝庭院閒清晝踈槐轉午隂悄無人過眼卻有事經心續夢聊欹枕牽愁擬破琴可憐精衛志欲障海波深獨覺簷滴蕭蕭靜微涼午睡宜鶯簧有餘韻蟻穴不多時篆燼回風滅花隂晚日移覺來無一事追夢續新詩踈梅發興江頭路相將月下臺衝行逢縞袂迫視得踈梅木偶當三嗅石腸應九回鍾情唯我輩欲去更徘徊古剎古剎囂塵外浮圖屋角西殘緇猶贊仰孳羽共依棲清影蕪城逺孤棱落照低丹梯儻容躡極目飽雙溪芳園勳業尊朝著園池近日光雕欄紅玉列羽蓋碧荷張草剃難滋蔓花開寧久長當年金谷地榛棘斷人腸挽丞相祁國公三首斧扆求良弼鈞衡得偉人文章照黼黻勳業見經綸化洽編氓阜時調寶厯新方祈永霖雨俄復跨箕辰寵極心彌小名尊貌愈恭勛華雙輔翼槐鼎四登庸海宇熙春物邉陲罷夕烽了無能致績頌筆漫形容強壯登黃閣斑衣衮繡成飛聲追丙魏有子繼韋平舟楫川方濟龍蛇夢倐驚天胡嗇遐夀舉世但哀榮挽知軍劉公三首種學三冬富禔身百行兼文章崑玉瑩政事莫邪銛才贍榮登早心休進取廉典刑今已矣遐想淚空霑屢贊紅蓮幕初分翠竹符五遷恩始浹三已愠曽無冠劔空幽壤儀容儼畫圖傳家有餘慶接武看諸孤昔我先君子期公泰茹連索文姑作贄拂䄂遽言旋偉節人難學髙風史逸傳雍碑誰秉筆願採入新篇紹興初先子帥越公自鄉里來訪先子以公名德託左史侯君逹於時宰侯云宰故聞公願得公所為文公哭且嘆拂袖東還行狀逸不載挽潘右司二首南州推望士北闕仰良臣風誼髙閭里聲名藹搢紳課兒千卷古與友一堂新石折符幽䜟山頽喪哲人再奉祠宫逸三遷省闥榮摳衣遲從槖回首遇佳城鵰鶚摶方急龍蛇夢忽驚但餘豐碣在凛凛氣猶生挽中書舍人葉公三首博學該羣籍飛聲藹上庠巍科曽疊貫要路遂橫翔策府登清選銓曹得望郎九重方簡在一鑑遽云亡遍歷清華地星辰紀未周雄文藏鳯閣直筆著螭頭聞望髙簮紱論思動冕旒從班無跬步底事却回輈久厭承明直遐宣使驛風乘軺循浙右持斧肅江東共徯鋒車召俄驚夜壑空傳家宜令子濟物有隂功挽知録李元老二首德齒追前輩聲華擅雋逰心期師孔孟文欲比曹劉丹桂枝髙折青雲路未周日駒偷過隙夜壑漫藏舟枳棘棲雲翼芙蓉泛緑波談𤣥三語足折獄片言多未熟黃梁夢俄悲薤露歌隂功付諸子異日踵巍科挽主簿吳寧侯三首德行追前輩聲華擅一鄉逰心終藝圃得雋屢文場小試棲鸞政連飛薦鶚章傷嗟臺閣地不許暫翺翔昔我先君子時稱鍳裁公知君非介紹虗館授兒童倒屣迎王粲登門得孔融他年記先友孰不仰清風憶昔荆湖日童心懵未開七年勤仰止一字有從來模範瞻如在音儀挽不回依歸今已矣些語寫餘哀挽內兄余聘可三首中外六兄弟相逢丱角中追隨萬里逺憂樂半生同勝韻談飛屑髙懷氣吐虹紛紛身外事回首萬緣空結髮事鉛槧終身尺寸功矯情多病後飲恨不言中户有三珠秀家愁五盜窮空山埋玉樹腸斷白楊風去去松塋路愁聞薤露詩齊眉乖婦約華髮重親悲被酒清狂後論文慷慨時傷心棲止地無復見形儀挽江公三首彩筆傳家學春華飾妙詞品題風鑑逺論議月評推柳岸隂將合濠亭迹半隳治家有遺訓留付寧馨兒世路方巇險髙情與衆殊一官聊戲劇三徑肯荒蕪富樂身兼有功名纍獨無豐碑誰秉筆持此較賢愚憶昔羈棲日唯公迹分親呼盧銀燭夜琢句錦囊春碁敵爭先徑弓號命中頻向來行樂地無復見斯人挽處士富公二首慶厯元臣後勳名泰華髙當年遺德澤流裔盡英豪繼世誇榮耀唯公隱寂寥潛輝傳野史猶足見清標家富倉箱積陶朱伯仲間禔身郭有道教子竇燕山錢鏄周貧匱刀圭起病孱懸知公不死學道透𤣥關挽處士吳德載二首憶昔知公日東嘉逆旅中遊從三月久談笑一樽同卻暑瓜盤緑烹鮮鱠筯紅傷心棲止地萬事轉頭空范蠡操贏日相如病渴時瓶罌雖屢罄砭劑已難施薤露鴒原慘松塋鴈序悲更嗟垂白叟泣送寧馨兒挽潘夫人閬苑花歸後香殘舊綺羅已應隨逝水無復步凌波遺訓芬蘭佩慈容想月娥空山埋玉處忍效鼓盆歌
