body:
  text: 提要䝉隱集二巻别集類三宋臣等謹案䝉隱集二巻宋陳棣撰棣始末諸書不載惟凌廸知萬姓統譜載陳汝錫字師予紹聖四年進士官至浙東安撫使子棣字鄂父以父任官至通判潭州今考集中知軍劉公挽詞第三首自注稱紹興初先子帥越與汝錫時代官階皆符當即其人惟譜稱通判潭州而集中食枸杞菊詩自序稱僕官桐川又有我今作椽嘗苦饑句稍為不合或初仕為桐川掾後終扵潭州歟集中有甲子除夕詩甲子為紹興十四年則猶髙宗時人也括蒼彚紀載汝錫嘗有閒愁莫浪遣留為痛飲資句為黄庭堅所賞則其家學淵源亦從元祐而來棣詩乃於南渡之初已先導宋季江湖之泒葢其足迹㳺厯不過數郡無名山大川以豁蕩心胸與所唱和者不過同官丞簿數人相與怨老嗟卑又鮮耆宿碩儒以開拓學識其詩邊幅稍狹比興稍淺固勢使之然然統各體而觀之雖乏鴻篇實殊偽體大都平易近情不失風㫖較以生硬晦澁為竒偉以鄙俚蕪雜為真切者其品固有間矣宋代遺篇日傳日少録而存之俾談藝家見所未見亦稽古者所不廢也自明以來選宋詩者皆未及厲鶚作宋詩紀事蒐羅賅博亦不載其姓名則原集之佚已久其巻帙多少不可復考詩惟一篇題甲子其年月先後亦不可知謹從永樂大典所載按體區分釐為上下二巻以畧存梗概焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:34c26fce5a132b922f2ab9267b4a9b97bbfd79b0db99d862c8fdaaf052b85296
